<script>
    var tableStr = {};
    var size = 0;


    function isEmpty(value) {
        if (value == "" || value == null || value == undefined || (value != null && typeof value == "object" && !Object.keys(value).length)) {
            return true;
        } else {
            return false;
        }
    }

    $(document).ready(function() {
        $('#header').load('common/header.html');
        $('#aside').load('common/aside.html');
        $('#footer').load('common/footer.html');
        createTable();

        $('#ipt_search_str').keypress(function (event) {
            if(event.keyCode == '13'){
                createTable();
            }
        })
    });

    function pagination() {

    }
    function createTable() {
        var param = {};
        param.searchStr = $('#ipt_search_str').val();
        param.order = 'idx ASC';
        param.page = 1;
        param = JSON.stringify(param);

        $.ajax({
            url: 'http://localhost:8845/Main/getTotalList',
            data: param,
            type: 'POST',
            contentType: 'application/json',
            success: function(data){
                size = data.length;
                var str = '';
                console.log(size);
                
                var idx = 0;
                $.each(data, function(i) {
                    var exemptedDate = data[i].exemptedDate;
                    
                    str += '<tr>';
                    str += '<th scope="row">' + data[i].main + '</th>';
                    str += '<td>' + (isEmpty(data[i].sub[0]) ? '' : data[i].sub[0]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].century[0]) ? '' : data[i].century[0])+ '</td>';
                    str += '<td>' + (isEmpty(data[i].century[1]) ? '' : data[i].century[1])+ '</td>';
                    str += '<td>' + (isEmpty(data[i].century[2]) ? '' : data[i].century[2])+ '</td>';
                    str += '<td>' + (isEmpty(data[i].centuryUpper[0]) ? '' : data[i].centuryUpper[0]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].centuryUpper[1]) ? '' : data[i].centuryUpper[1]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].dotax[0]) ? '' : data[i].dotax[0]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].dotaxUpper[0]) ? '' : data[i].dotaxUpper[0]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].dotaxUpper[1]) ? '' : data[i].dotaxUpper[1]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].dotaxUpper[2]) ? '' : data[i].dotaxUpper[2]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].dotaxUpper[3]) ? '' : data[i].dotaxUpper[3]) + '</td>';
                    str += '<td>' + (isEmpty(data[i].exemptedDate) ? '' : exemptedDate.split(" ")[0]) + '</td>'; 
                    str += '</tr>'

                    if (idx == 19) {
                        tableStr.push(str);
                        idx = 0;
                    }
                    idx++;
                });
            },
        })
    }

    function pageLink(curPage, totalPages, funName) {
        var pageUrl = "";
        
        var pageLimit = 5;
        var startPage = parseInt((curPage - 1) / pageLimit) * pageLimit + 1;
        var endPage = startPage + pageLimit - 1;
        
        if (totalPages < endPage) {
            endPage = totalPages;
        }
        
        var nextPage = endPage + 1;
        //console.log(curPage,"curPage,",startPage,"startPage,",endPage,"endPage,",nextPage,"nextPage")
        
        //맨 첫 페이지
        if (curPage > 1 && pageLimit < curPage) {
            pageUrl += "<a class='page first' href='javascript:" + funName + "(1);'><i class='fas fa-angle-double-left'></a>";
        }
        //이전 페이지
        if (curPage > pageLimit) {
            pageUrl += " <a class='page prev' href='javascript:" + funName + "(" + (startPage == 1 ? 1 : startPage - 1) + ");'><i class='fas fa-angle-left'></a>";
        }
        //~pageLimit 맞게 페이지 수 보여줌
        for (var i = startPage; i <= endPage; i++) {
            //현재페이지면 진하게 표시
            if (i == curPage) {
                pageUrl += " <a href='#'><strong>" + i + "</strong></a>"
            } else {
                pageUrl += " <a href='javascript:" + funName + "(" + i + ");'> " + i + " </a>";
            }
        }
        //다음 페이지
        if (nextPage <= totalPages) {
            pageUrl += "<a class='page next' href='javascript:" + funName + "(" + (nextPage < totalPages ? nextPage : totalPages) + ");'><i class='fas fa-angle-right'></a>";
        }
        //맨 마지막 페이지
        if (curPage < totalPages && nextPage < totalPages) {
            pageUrl += "<a class='page last' href='javascript:" + funName + "(" + totalPages + ");'><i class='fas fa-angle-double-right'></a>";
        }
        //console.log(pageUrl);
        
        return pageUrl;
    }
</script>
